# GitLab SAST Integration for Pynagent
# Include this template in your .gitlab-ci.yml

variables:
  Pynagent_VERSION: "latest"

Pynagent_sast:
  stage: test
  image: python:3.12-slim
  allow_failure: true  # Set to false to block pipeline on findings
  script:
    - pip install Pynagent-cli==$Pynagent_VERSION
    - Pynagent check --format sarif --output Pynagent-results.sarif .
    - python3 -c "
        import json, sys
        with open('Pynagent-results.sarif') as f:
            data = json.load(f)
            results = data.get('runs', [{}])[0].get('results', [])
            critical = len([r for r in results if r.get('level') == 'error'])
            warnings = len([r for r in results if r.get('level') == 'warning'])
            notes = len([r for r in results if r.get('level') == 'note'])
            print(f'Total findings: {len(results)} (Critical: {critical}, Warnings: {warnings}, Notes: {notes})')
        "
  artifacts:
    reports:
      sast: Pynagent-results.sarif
    when: always
    expire_in: 1 week
  dependencies: []
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^security-/

Pynagent_sast_native:
  stage: test
  image: ghcr.io/Pynagent/pynagent:latest
  allow_failure: true
  script:
    - Pynagent scan --format sarif --output pynagent-results.sarif .
  artifacts:
    reports:
      sast: pynagent-results.sarif
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
