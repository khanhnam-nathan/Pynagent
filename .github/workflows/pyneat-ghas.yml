name: Pynagent SAST (GitHub Advanced Security)

on:
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.go'
      - '**.java'
      - '**.rs'
      - '**.cs'
      - '**.php'
      - '**.rb'
  pull_request:
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.go'
      - '**.java'
      - '**.rs'
      - '**.cs'
      - '**.php'
      - '**.rb'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  Pynagent-scan:
    name: Pynagent Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pynagent
        run: pip install Pynagent-cli

      - name: Run Pynagent Scan
        run: |
          Pynagent check \
            --format sarif \
            --output Pynagent-results.sarif \
            --severity info \
            .

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: Pynagent-results.sarif
          category: "Pynagent-sast"

      - name: Summary
        run: |
          TOTAL=$(cat Pynagent-results.sarif | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "0")
          echo "## Pynagent Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Total findings: $TOTAL" >> $GITHUB_STEP_SUMMARY

  pynagent-scan:
    name: pynagent Native Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Build pynagent
        run: |
          cd pynagent
          cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Run pynagent Scan
        run: |
          ./pynagent/target/release/Pynagent scan \
            --format sarif \
            --output pynagent-results.sarif \
            .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pynagent-results.sarif
          category: "pynagent-sast"
