# fly.toml configuration for Fly.io deployment
# Docs: https://fly.io/docs/reference/configuration/

app = "Pynagent-github-app"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Secrets (set via `fly secrets set`)
# APP_ID, WEBHOOK_SECRET, AMD_API_KEY, AMD_API_URL, REDIS_URL, etc.
