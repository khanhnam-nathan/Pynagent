# Pre-commit configuration for Pynagent
#
# Install:
#   pip install pre-commit Pynagent
#   pre-commit install
#
# Update hooks:
#   pre-commit autoupdate
#
# Enhanced features:
#   - Scans only staged files (not all files in the repo)
#   - Supports multiple languages via --lang flag
#   - Fails fast on critical security issues
#   - Non-blocking manifest generation
#   - Respects .pre-commit-override.yaml for local config

repos:
  # Pynagent - AI-Generated Code Scanner
  - repo: local
    hooks:
      # Security scan - fast, runs on all staged Python files
      - id: Pynagent-security
        name: Pynagent Security Scan
        description: Scan for security vulnerabilities in Python code (staged files only)
        entry: python -c "import subprocess, sys; files=[f for f in sys.argv[1:] if f.endswith('.py')]; sys.exit(subprocess.call(['Pynagent', 'check'] + files + ['--severity', '--fail-on', 'critical']) if files else 0)"
        language: system
        stages: [pre-commit, push]
        pass_filenames: true
        require_serial: false

      # Code quality check - dry-run mode with diff
      - id: Pynagent-clean
        name: Pynagent AI Code Scanner
        description: Clean AI-generated code patterns, remove debug prints, fix security issues
        entry: python -c "import subprocess, sys; files=[f for f in sys.argv[1:] if f.endswith('.py')]; sys.exit(subprocess.call(['Pynagent', 'clean'] + files + ['--dry-run', '--diff']) if files else 0)"
        language: system
        stages: [pre-commit]
        pass_filenames: true
        require_serial: false

      # Auto-generate PYNAGENT manifest (non-blocking)
      - id: Pynagent-manifest
        name: Pynagent Manifest Generator
        description: Generate .Pynagent.manifest.json for AI editors (non-blocking)
        entry: Pynagent clean --export-manifest --dry-run
        language: system
        files: \.py$
        stages: [pre-commit]
        always_run: false
        pass_filenames: true

      # Check mode - blocks commit on issues (push stage)
      - id: Pynagent-check
        name: Pynagent Check Mode
        description: Check code without making changes (blocks on critical issues)
        entry: python -c "import subprocess, sys; files=[f for f in sys.argv[1:] if f.endswith('.py')]; result=subprocess.call(['Pynagent', 'check'] + files + ['--fail-on', 'high']) if files else 0; sys.exit(result)"
        language: system
        stages: [push]
        pass_filenames: true
        require_serial: false

      # Multi-language scan - JavaScript/TypeScript
      - id: Pynagent-js-scan
        name: Pynagent JS/TS Scanner
        description: Scan JavaScript and TypeScript files for security issues
        entry: python -c "import subprocess, sys, os; js=[f for f in sys.argv[1:] if f.endswith(('.js','.jsx','.ts','.tsx'))]; sys.exit(subprocess.call(['Pynagent', 'check', '.'] + (['--lang', 'javascript'] if os.environ.get('PRE_COMMIT') else [])) if js else 0)"
        language: system
        stages: [pre-commit, push]
        pass_filenames: true
        types: [javascript, typescript]

      # Terraform/IaC scan
      - id: Pynagent-iac-scan
        name: Pynagent IaC Scanner
        description: Scan Terraform and Kubernetes files for misconfigurations
        entry: python -c "import subprocess, sys; tf=[f for f in sys.argv[1:] if f.endswith(('.tf','.yaml','.yml'))]; sys.exit(0) if not tf else subprocess.call(['Pynagent', 'check'] + tf)"
        language: system
        stages: [pre-commit, push]
        pass_filenames: true
        types: [terraform, kubernetes]

  # Standard Python tools
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --ignore=E501,W503]

  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.secrets\.baseline|node_modules/|dist/|build/)$

ci:
  # Skip expensive scans on documentation-only changes
  autoupdate_schedule: monthly
  skip_unstaged_changes: false
